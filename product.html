<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0e">
  <title>Producto | CedrickStore</title>
  <meta name="description" content="Detalle de producto premium en CedrickStore.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c9a227'/%3E%3Ctext x='16' y='23' font-family='Poppins,sans-serif' font-size='20' font-weight='800' text-anchor='middle' fill='%23151515'%3EC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="catalog">
  <main>
    <div class="page-head">
      <div class="container">
        <nav class="breadcrumb" id="crumb"><a href="index.html">Inicio</a><span class="sep">/</span><a href="catalog.html">Catálogo</a></nav>
      </div>
    </div>

    <div class="container section--tight" id="pdpRoot">
      <!-- inyectado por product.js -->
      <div class="center" style="min-height:300px"><div class="muted">Cargando producto…</div></div>
    </div>

    <!-- TABS DESCRIPCIÓN / ESPECIFICACIONES / RESEÑAS -->
    <div class="container section--tight" id="pdpTabsRoot" hidden>
      <div class="tabs" id="pdpTabs">
        <button class="tab active" data-tab="desc">Descripción</button>
        <button class="tab" data-tab="specs">Especificaciones</button>
        <button class="tab" data-tab="reviews">Opiniones</button>
      </div>
      <div id="tab-desc" class="tab-pane"></div>
      <div id="tab-specs" class="tab-pane hidden"></div>
      <div id="tab-reviews" class="tab-pane hidden"></div>
    </div>

    <!-- RELACIONADOS -->
    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="section-head"><div><span class="eyebrow">También te puede gustar</span><h2 class="section-title">Productos relacionados</h2></div></div>
        <div class="product-grid" id="relatedGrid"></div>
      </div>
    </section>

    <!-- RECOMENDADOS -->
    <section class="section" style="padding-top:0">
      <div class="container">
        <div class="section-head"><div><span class="eyebrow">Para ti</span><h2 class="section-title">Recomendados</h2></div></div>
        <div class="product-grid" id="recommendedGrid"></div>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
